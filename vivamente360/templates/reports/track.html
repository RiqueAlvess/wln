{% extends 'reports/base_public.html' %}

{% block title %}Acompanhar Denúncia{% endblock %}

{% block content %}
<div class="card mb-4">
    <div class="card-body p-4">
        <h5 class="fw-bold mb-3">
            <i class="bi bi-search"></i> Acompanhar Denúncia
        </h5>

        {% if error %}
        <div class="alert alert-danger border-0">
            <i class="bi bi-exclamation-triangle-fill"></i> {{ error }}
        </div>
        {% endif %}

        <form method="post">
            {{ csrf_input }}

            <div class="mb-3">
                <label for="protocolo" class="form-label fw-semibold">Protocolo</label>
                <input type="text" name="protocolo" id="protocolo" class="form-control"
                       placeholder="Ex: A1B2C3D4E5F6" required
                       style="text-transform: uppercase;">
            </div>

            <div class="mb-4">
                <label for="access_token" class="form-label fw-semibold">Chave de Acesso</label>
                <input type="text" name="access_token" id="access_token" class="form-control"
                       placeholder="Cole sua chave de acesso aqui" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-search"></i> Consultar
                </button>
            </div>
        </form>
    </div>
</div>

<div class="text-center">
    <a href="{{ url('reports:create', empresa_slug=empresa.slug) }}" class="text-muted small">
        <i class="bi bi-plus-circle"></i> Fazer nova denúncia
    </a>
</div>
{% endblock %}
